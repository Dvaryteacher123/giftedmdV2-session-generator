<!DOCTYPE html>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #00d2ff; --dark: #0f172a; --key-bg: #1e293b; --keyboard-bg: #000; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; min-height: 100vh; margin: 0; padding-bottom: 20px; overflow: hidden; }

        /* ENEO LA KUANDIKIA */
        .input-container { width: 90%; max-width: 500px; margin-bottom: 30px; flex-grow: 1; display: flex; flex-direction: column; justify-content: center;}
        #display { width: 100%; padding: 15px; font-size: 18px; border-radius: 12px; border: 2px solid var(--primary); background: #000; color: #00ff88; box-sizing: border-box; outline: none; min-height: 50px; word-break: break-all; overflow-y: auto;}

        /* KEYBOARD LAYOUT */
        .keyboard { background: var(--keyboard-bg); padding: 8px; border-radius: 20px 20px 0 0; width: 100%; max-width: 500px; box-shadow: 0 -5px 20px rgba(0,0,0,0.5); border-top: 1px solid #333; position: relative; transition: 0.3s ease-in-out; }
        .row { display: flex; justify-content: center; gap: 4px; margin-bottom: 6px; }
        
        .key { 
            background: var(--key-bg); border: none; color: white; 
            padding: 10px 0; width: 8.5%; border-radius: 6px; 
            font-size: 15px; font-weight: bold; cursor: pointer; 
            transition: 0.1s; display: flex; align-items: center; justify-content: center;
            user-select: none;
        }
        .key:active { background: var(--primary); color: black; transform: scale(0.9); }
        
        /* KEYS MAALUM */
        .key-wide { width: 14%; background: #334155; }
        .key-space { width: 45%; background: #334155; }
        .key-enter { width: 16%; background: var(--primary); color: black; font-size: 12px;}
        .key-delete { width: 12%; background: #e74c3c; }
        .key-emoji { width: 12%; background: #f1c40f; color: black; font-size: 18px; }

        /* EMOJI PICKER PANEL */
        .emoji-picker { 
            position: absolute; bottom: 100%; left: 0; width: 100%; height: 200px; 
            background: #111; border-radius: 15px 15px 0 0; border-top: 2px solid #333; 
            display: none; flex-direction: column; overflow: hidden; z-index: 10;
        }
        .emoji-picker.show { display: flex; }
        .emoji-header { display: flex; background: #222; padding: 5px; gap: 5px; overflow-x: auto; border-bottom: 1px solid #333;}
        .emoji-tab { background: none; border: none; color: #888; font-size: 16px; padding: 5px 10px; cursor: pointer;}
        .emoji-tab.active { color: var(--primary); border-bottom: 2px solid var(--primary); }
        .emoji-content { display: grid; grid-template-columns: repeat(8, 1fr); gap: 5px; padding: 10px; overflow-y: auto; flex-grow: 1;}
        .emoji-item { font-size: 22px; cursor: pointer; text-align: center; user-select: none; transition: 0.1s;}
        .emoji-item:active { transform: scale(1.2); }

    </style>
</head>
<body>

    <div class="input-container">
        <h3 style="text-align: center; color: var(--primary); margin-bottom: 10px;">DVARY KEYBOARD PRO</h3>
        <div id="display" contenteditable="true" placeholder="Andika..."></div>
    </div>

    <div class="keyboard" id="keyboard">
        
        <div class="emoji-picker" id="emojiPicker">
            <div class="emoji-header">
                <button class="emoji-tab active" onclick="showEmojiTab('smileys')">😊</button>
                <button class="emoji-tab" onclick="showEmojiTab('animals')">🐶</button>
                <button class="emoji-tab" onclick="showEmojiTab('food')">🍎</button>
                <button class="emoji-tab" onclick="showEmojiTab('travel')">🚗</button>
                <button class="emoji-tab" onclick="showEmojiTab('objects')">💡</button>
            </div>
            <div class="emoji-content" id="emojiContent">
                </div>
        </div>

        <div class="row">
            <button class="key" onclick="press('1')">1</button>
            <button class="key" onclick="press('2')">2</button>
            <button class="key" onclick="press('3')">3</button>
            <button class="key" onclick="press('4')">4</button>
            <button class="key" onclick="press('5')">5</button>
            <button class="key" onclick="press('6')">6</button>
            <button class="key" onclick="press('7')">7</button>
            <button class="key" onclick="press('8')">8</button>
            <button class="key" onclick="press('9')">9</button>
            <button class="key" onclick="press('0')">0</button>
        </div>

        <div class="row">
            <button class="key" onclick="press('Q')">Q</button>
            <button class="key" onclick="press('W')">W</button>
            <button class="key" onclick="press('E')">E</button>
            <button class="key" onclick="press('R')">R</button>
            <button class="key" onclick="press('T')">T</button>
            <button class="key" onclick="press('Y')">Y</button>
            <button class="key" onclick="press('U')">U</button>
            <button class="key" onclick="press('I')">I</button>
            <button class="key" onclick="press('O')">O</button>
            <button class="key" onclick="press('P')">P</button>
        </div>

        <div class="row">
            <button class="key" onclick="press('A')">A</button>
            <button class="key" onclick="press('S')">S</button>
            <button class="key" onclick="press('D')">D</button>
            <button class="key" onclick="press('F')">F</button>
            <button class="key" onclick="press('G')">G</button>
            <button class="key" onclick="press('H')">H</button>
            <button class="key" onclick="press('J')">J</button>
            <button class="key" onclick="press('K')">K</button>
            <button class="key" onclick="press('L')">L</button>
        </div>

        <div class="row">
            <button class="key key-wide" onclick="toggleCaps()"><i class="fas fa-arrow-up"></i></button>
            <button class="key" onclick="press('Z')">Z</button>
            <button class="key" onclick="press('X')">X</button>
            <button class="key" onclick="press('C')">C</button>
            <button class="key" onclick="press('V')">V</button>
            <button class="key" onclick="press('B')">B</button>
            <button class="key" onclick="press('N')">N</button>
            <button class="key" onclick="press('M')">M</button>
            <button class="key key-delete" onclick="backspace()"><i class="fas fa-backspace"></i></button>
        </div>

        <div class="row">
            <button class="key key-emoji" onclick="toggleEmojiPicker()">😊</button>
            <button class="key" onclick="press(',')">,</button>
            <button class="key key-space" onclick="press(' ')">SPACE</button>
            <button class="key" onclick="press('.')">.</button>
            <button class="key key-enter" onclick="send()">SEND</button>
        </div>
    </div>

    <script>
        const display = document.getElementById('display');
        const keyboard = document.getElementById('keyboard');
        const emojiPicker = document.getElementById('emojiPicker');
        const emojiContent = document.getElementById('emojiContent');
        let isCaps = true;

        // EMOJI DATABASE (Mifano ya makundi)
        const emojiData = {
            smileys: ['😊', '😂', '🤣', '❤️', '😍', '😒', '😭', '😩', '😤', '😡', '😎', '🤓', '🥳', '🤔', '🤫', '🤥', '😬', '😮', '😴', '🤤', '😵', '😷', '😇', '💩', '👻', '💀', '👽', '🤖'],
            animals: ['🐶', '🐱', '🐭', '🐹', '🐰', '🦊', '🐻', '🐼', '🐨', '🐯', '🦁', '🐮', '🐷', '🐸', '🐵', '🐔', '🐧', '🐦', '🐦', '🦆', '🦅', '🦉', '🦇', '🐺', '🐗', '🐴', '🦄', '🐝'],
            food: ['🍎', '🍐', '🍊', '🍋', '🍌', '🍉', '🍇', '🍓', '🍈', '🍒', '🍑', '🍍', '🥥', '🥝', '🍅', '🍆', '🥑', '🥦', '🌽', '🥕', '🥔', '🥖', '🍞', '🧀', '🍗', '🥩', '🍔', '🍟'],
            travel: ['🚗', '🚕', '🚙', '🚌', '🚎', '🏎️', '🚓', '🚑', '🚒', '🚐', '🚚', '🚛', '🚜', '🛵', '🚲', '🛴', '🛵', '🛤️', '✈️', '🛫', '🛬', '🚀', '🚁', '⛴️', '🚢', '🚢', '⚓', '🚢'],
            objects: ['💡', '🔦', '🕯️', '🗑️', '🛒', '🎁', '🎈', '🎏', '🎎', '🛀', '🛌', '💡', '🔦', '🕯️', '🗑️', '🛒', '🎁', '🎈', '🎏', '🎎', '🛀', '🛌']
        };

        function press(key) {
            display.innerText += (isCaps && /[a-zA-Z]/.test(key)) ? key : key.toLowerCase();
            // Funga emoji picker tukianza kuandika herufi
            if (emojiPicker.classList.contains('show')) toggleEmojiPicker();
        }

        function backspace() {
            const current = display.innerText;
            display.innerText = current.substring(0, current.length - 1);
        }

        function toggleCaps() {
            isCaps = !isCaps;
            const keys = document.querySelectorAll('.key');
            keys.forEach(k => {
                if(k.innerText.length === 1 && /[a-zA-Z]/.test(k.innerText)) {
                    k.innerText = isCaps ? k.innerText.toUpperCase() : k.innerText.toLowerCase();
                }
            });
        }

        function send() {
            const msg = display.innerText;
            if(!msg) return;
            alert("Ujumbe wa Dvary: " + msg);
            window.location.href = "https://wa.me/?text=" + encodeURIComponent(msg);
            display.innerText = "";
        }

        // EMOJI PICKER LOGIC
        function toggleEmojiPicker() {
            emojiPicker.classList.toggle('show');
            if (emojiPicker.classList.contains('show')) {
                showEmojiTab('smileys'); // Onyesha smileys mwanzo
            }
        }

        function showEmojiTab(category) {
            // Update Active Tab
            const tabs = document.querySelectorAll('.emoji-tab');
            tabs.forEach(t => t.classList.remove('active'));
            event.target.classList.add('active'); // Hii inaweza kufeli, tutarekebisha

            // Update Content
            emojiContent.innerHTML = '';
            const emojis = emojiData[category];
            emojis.forEach(emoji => {
                const span = document.createElement('span');
                span.className = 'emoji-item';
                span.innerText = emoji;
                span.onclick = () => {
                    display.innerText += emoji; // Weka emoji kwenye display
                };
                emojiContent.appendChild(span);
            });
        }
        
        // Kurekebisha tab active event
        const emojiHeader = document.querySelector('.emoji-header');
        emojiHeader.addEventListener('click', (e) => {
            if(e.target.classList.contains('emoji-tab')) {
                const tabs = document.querySelectorAll('.emoji-tab');
                tabs.forEach(t => t.classList.remove('active'));
                e.target.classList.add('active');
            }
        });

    </script>
</body>
</html>
