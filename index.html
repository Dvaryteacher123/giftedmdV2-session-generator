<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DVARY DOWNLOADER | PRO BYPASS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #00ffcc; --bg: #050810; --card: #0a0f1a; }
        body { background: var(--bg); color: var(--p); font-family: 'Share Tech Mono', monospace; margin: 0; padding: 20px; text-align: center; text-transform: uppercase; }
        
        .top-nav { position: absolute; top: 20px; right: 20px; z-index: 100; }
        .menu-dots { color: var(--p); font-size: 24px; cursor: pointer; transition: 0.3s; padding: 10px; border-radius: 50%; }

        .container { max-width: 450px; margin: 60px auto; padding: 30px; border: 1px solid var(--p); background: var(--card); box-shadow: 0 0 20px rgba(0, 255, 204, 0.2); border-radius: 10px; position: relative; }
        .logo { font-size: 24px; font-weight: 900; letter-spacing: 5px; margin-bottom: 10px; color: #fff; text-shadow: 0 0 10px var(--p); }

        input { width: 100%; padding: 18px; background: #000; border: 1px solid var(--p); color: #fff; text-align: center; outline: none; margin-bottom: 20px; box-sizing: border-box; font-size: 14px; border-radius: 5px; }
        
        .btn-download { width: 100%; padding: 18px; background: var(--p); color: #000; border: none; font-weight: 900; cursor: pointer; letter-spacing: 2px; border-radius: 5px; }
        .btn-download:disabled { background: #111; color: #444; }

        #resultArea { margin-top: 30px; display: none; border: 1px dashed var(--p); padding: 20px; background: rgba(0,0,0,0.8); border-radius: 10px; }
        .dl-btn { display: block; background: #fff; color: #000; padding: 15px; text-decoration: none; font-weight: bold; border-radius: 5px; margin-top: 10px; font-size: 14px; }
        
        .loader { display: none; margin: 20px 0; font-size: 14px; color: #ff003c; font-weight: bold; }
    </style>
</head>
<body>

    <div class="top-nav">
        <a href="https://whatsapp.com/channel/0029VbCRC9b5fM5cruU8PF2M" target="_blank">
            <div class="menu-dots"><i class="fas fa-ellipsis-v"></i></div>
        </a>
    </div>

    <div class="container">
        <div class="logo">DVARY_DL_V8</div>
        <p style="font-size: 9px; color: #444; margin-bottom: 20px;">[ ENGINE: SNAP_BYPASS_v1 ]</p>
        
        <input type="text" id="urlInput" placeholder="WEKA LINK (FB AU TIKTOK)">
        
        <div class="loader" id="loading">UNLOCKING FIREWALL...</div>

        <button class="btn-download" id="goBtn" onclick="processDownload()">ANZA DOWNLOAD</button>

        <div id="resultArea">
            <p style="font-size: 12px; color: #fff;">SUCCESS! CHAGUA QUALITY:</p>
            <div id="actions"></div>
        </div>
    </div>

    <script>
        async function processDownload() {
            const url = document.getElementById('urlInput').value;
            const loader = document.getElementById('loading');
            const btn = document.getElementById('goBtn');
            const resArea = document.getElementById('resultArea');
            const actions = document.getElementById('actions');

            if(!url) return alert("Weka link Mwalimu!");

            loader.style.display = 'block';
            btn.disabled = true;
            resArea.style.display = 'none';
            actions.innerHTML = '';

            try {
                // KITALAAMU: Tunatumia API ya Global inayozunguka ulinzi wa FB
                // Hii inafanya kazi kwa TikTok na Facebook chapu
                const response = await fetch("https://api.tikwm.com/api/?url=" + encodeURIComponent(url));
                const data = await response.json();

                if (data.code === 0 && data.data) {
                    const videoData = data.data;
                    
                    if(url.includes('tiktok')) {
                        actions.innerHTML = `<a href="https://api.tikwm.com${videoData.play}" class="dl-btn" target="_blank">DOWNLOAD HD (NO-WM)</a>`;
                    } else {
                        // FB Bypass Logic
                        actions.innerHTML = `<a href="${videoData.play}" class="dl-btn" target="_blank">DOWNLOAD FACEBOOK VIDEO</a>`;
                    }
                    resArea.style.display = 'block';
                } else {
                    // Kama FB imezidiwa, tunatumia ujanja wa pili (In-App Downloader)
                    window.open(`https://snapsave.app/st?url=${url}`, '_blank');
                    loader.innerText = "OPENING SECURE DOWNLOADER...";
                }
            } catch (e) {
                alert("Hitilafu! Jaribu tena.");
            } finally {
                loader.style.display = 'none';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
