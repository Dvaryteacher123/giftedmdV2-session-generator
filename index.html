<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dvary Cloud Drive</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #0088cc; --dark: #0f172a; --card: #1e293b; --success: #25D366; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; margin: 0; }

        /* SIDEBAR */
        .sidebar { position: fixed; left: -260px; top: 0; width: 250px; height: 100%; background: #000; transition: 0.4s; z-index: 1000; padding-top: 60px; border-right: 1px solid #333; }
        .sidebar.active { left: 0; }
        .sidebar a { padding: 15px 25px; text-decoration: none; color: #888; display: block; border-bottom: 1px solid #111; }
        .sidebar a:hover { background: var(--primary); color: white; }
        
        .menu-btn { position: fixed; top: 20px; left: 20px; font-size: 22px; cursor: pointer; z-index: 1100; background: var(--primary); color: white; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; border-radius: 12px; }

        /* MAIN CONTENT */
        .container { max-width: 500px; margin: 80px auto; padding: 20px; }
        .upload-card { background: var(--card); padding: 30px; border-radius: 25px; text-align: center; border: 1px solid #334155; }
        
        .drop-zone { border: 2px dashed var(--primary); padding: 40px 20px; border-radius: 20px; cursor: pointer; margin-bottom: 20px; transition: 0.3s; }
        .drop-zone:hover { background: rgba(0, 136, 204, 0.1); }
        .drop-zone i { font-size: 50px; color: var(--primary); margin-bottom: 15px; }

        .btn-upload { width: 100%; padding: 16px; background: var(--primary); border: none; border-radius: 15px; color: white; font-weight: bold; cursor: pointer; font-size: 16px; }
        
        #fileList { margin-top: 30px; }
        .file-item { background: #0f172a; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; border: 1px solid #333; }
        .file-item a { color: var(--success); text-decoration: none; font-size: 12px; font-weight: bold; }

        /* VIDUDE VITATU */
        .wa-float { position: fixed; right: 20px; bottom: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 1000; }
        .wa-btn { width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; text-decoration: none; font-size: 22px; box-shadow: 0 4px 15px rgba(0,0,0,0.4); transition: 0.3s; }
        .bg-wa { background: #25D366; }
        .bg-info { background: #0088cc; }
        .bg-help { background: #ff9800; }

        .hidden { display: none; }
        #progress { margin-top: 10px; color: var(--success); font-size: 12px; display: none; }
    </style>
</head>
<body>

    <div class="menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></div>

    <div class="sidebar" id="mySidebar">
        <h3 style="text-align: center; color: var(--primary);">DVARY DRIVE</h3>
        <a href="#"><i class="fas fa-folder-open"></i> Mafaili Yangu</a>
        <a href="#"><i class="fas fa-video"></i> Video Zangu</a>
        <a href="#"><i class="fas fa-file-pdf"></i> Documents</a>
        <a href="#"><i class="fas fa-trash"></i> Trash</a>
    </div>

    <div class="container">
        <div class="upload-card">
            <h2>HIFADHI FAILI</h2>
            <p style="font-size: 13px; color: #888;">Upload Video, PDF, au Picha sasa.</p>
            
            <div class="drop-zone" onclick="document.getElementById('fileInput').click()">
                <i class="fas fa-cloud-upload-alt"></i>
                <p id="fileName">Bonyeza hapa kuchagua faili</p>
                <input type="file" id="fileInput" class="hidden" onchange="showName()">
            </div>

            <button class="btn-upload" onclick="uploadFile()">PANDISHA KWENYE DRIVE (UPLOAD)</button>
            <div id="progress">Inapandisha... Tafadhali subiri.</div>
        </div>

        <div id="fileList">
            <h4 style="border-bottom: 1px solid #333; padding-bottom: 5px;">MAFFAILI YA KARIBUNI</h4>
            </div>
    </div>

    <div class="wa-float">
        <a href="https://wa.me/225752670587" class="wa-btn bg-help"><i class="fas fa-question"></i></a>
        <a href="https://wa.me/225752670587" class="wa-btn bg-info"><i class="fas fa-info"></i></a>
        <a href="https://wa.me/225752670587" class="wa-btn bg-wa"><i class="fab fa-whatsapp"></i></a>
    </div>

    <script>
        function toggleSidebar() {
            document.getElementById("mySidebar").classList.toggle("active");
        }

        function showName() {
            const input = document.getElementById('fileInput');
            document.getElementById('fileName').innerText = input.files[0].name;
        }

        function uploadFile() {
            const file = document.getElementById('fileInput').files[0];
            if(!file) return alert("Chagua faili kwanza!");

            document.getElementById('progress').style.display = 'block';

            // MFANO WA UPLOAD (Simulated)
            // Kwa mradi wa kweli, hapa tutatumia Firebase au Cloudinary API
            setTimeout(() => {
                addFileToList(file.name);
                document.getElementById('progress').style.display = 'none';
                document.getElementById('fileName').innerText = "Bonyeza hapa kuchagua faili";
                alert("✅ Faili limehifadhiwa kwenye Dvary Drive!");
            }, 3000);
        }

        function addFileToList(name) {
            const list = document.getElementById('fileList');
            const item = document.createElement('div');
            item.className = 'file-item';
            item.innerHTML = `
                <span><i class="fas fa-file"></i> ${name}</span>
                <a href="#" onclick="alert('Inatayarisha Download Link...')">DOWNLOAD</a>
            `;
            list.prepend(item);
        }
    </script>
</body>
</html>
