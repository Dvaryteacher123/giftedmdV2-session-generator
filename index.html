<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DVARY DEEP-SCAN | SECURITY TOOL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --neon: #00ffcc; --bg: #050810; --card: #0a0f1a; }
        body { background: var(--bg); color: var(--neon); font-family: 'Share Tech Mono', monospace; margin: 0; padding: 15px; text-align: center; text-transform: uppercase; }
        
        .container { max-width: 450px; margin: 50px auto; padding: 30px; border: 1px solid var(--neon); background: var(--card); box-shadow: 0 0 20px rgba(0, 255, 204, 0.2); border-radius: 10px; }
        .logo { font-size: 24px; font-weight: 900; letter-spacing: 5px; margin-bottom: 5px; color: #fff; }
        .subtitle { font-size: 10px; color: #444; margin-bottom: 30px; }

        .info-row { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #111; font-size: 12px; }
        .label { color: #555; }
        .value { color: #fff; text-shadow: 0 0 5px var(--neon); }

        .btn-scan { width: 100%; padding: 18px; background: var(--neon); color: #000; border: none; font-weight: 900; cursor: pointer; letter-spacing: 2px; margin-top: 25px; border-radius: 5px; }
        
        .radar { width: 60px; height: 60px; border: 2px solid var(--neon); border-radius: 50%; margin: 0 auto 20px; position: relative; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(0, 255, 204, 0.4); } 70% { box-shadow: 0 0 0 20px rgba(0, 255, 204, 0); } 100% { box-shadow: 0 0 0 0 rgba(0, 255, 204, 0); } }
        
        .loader-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; display: none; }
    </style>
</head>
<body>

    <div id="loader" class="loader-overlay">
        <div class="radar"></div>
        <p style="letter-spacing: 5px;">INJECTING_PROBES...</p>
    </div>

    <div class="container">
        <div class="logo">DVARY_SCAN_v1</div>
        <div class="subtitle">[ OSINT SYSTEM READY ]</div>

        <div id="scanResult">
            <div class="info-row">
                <span class="label">MY_IP_ADDRESS:</span>
                <span class="value" id="ip">0.0.0.0</span>
            </div>
            <div class="info-row">
                <span class="label">LOCATION:</span>
                <span class="value" id="location">WAITING...</span>
            </div>
            <div class="info-row">
                <span class="label">NETWORK_ISP:</span>
                <span class="value" id="isp">WAITING...</span>
            </div>
            <div class="info-row">
                <span class="label">DEVICE_OS:</span>
                <span class="value" id="os">WAITING...</span>
            </div>
        </div>

        <button class="btn-scan" onclick="startDeepScan()">INITIATE DEEP SCAN</button>

        <a href="https://whatsapp.com/channel/0029VbCRC9b5fM5cruU8PF2M" style="display:block; margin-top:20px; color:#444; font-size:10px; text-decoration:none;">
            <i class="fas fa-ellipsis-v"></i> JOIN DVARY ACADEMY
        </a>
    </div>

    <script>
        async function startDeepScan() {
            const loader = document.getElementById('loader');
            loader.style.display = 'flex';

            try {
                // Tunatumia ipapi.co kupata data za kweli (Bure na Chapu)
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();

                setTimeout(() => {
                    document.getElementById('ip').innerText = data.ip;
                    document.getElementById('location').innerText = `${data.city}, ${data.country_name}`;
                    document.getElementById('isp').innerText = data.org;
                    document.getElementById('os').innerText = navigator.platform;
                    
                    loader.style.display = 'none';
                }, 2000);

            } catch (error) {
                alert("ACCESS DENIED: ERROR_FETCHING_DATA");
                loader.style.display = 'none';
            }
        }
    </script>
</body>
</html>
