<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DVARY UNBAN | MATRIX SYSTEM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --neon: #00ffcc; --bg: #000; }
        
        body { 
            background-color: var(--bg); 
            color: var(--neon); 
            font-family: 'Share Tech Mono', monospace; 
            margin: 0; overflow: hidden; height: 100vh;
        }

        /* MATRIX CANVAS */
        #matrix {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1; opacity: 0.3;
        }

        .container {
            position: relative; z-index: 10;
            max-width: 400px; margin: 50px auto; 
            background: rgba(13, 17, 23, 0.9); 
            padding: 30px; border-radius: 15px; 
            border: 1px solid var(--neon);
            box-shadow: 0 0 25px rgba(0, 255, 204, 0.4);
            text-align: center;
        }

        .logo { font-size: 26px; font-weight: bold; letter-spacing: 5px; margin-bottom: 5px; text-shadow: 0 0 10px var(--neon); }
        .subtitle { font-size: 10px; color: #888; margin-bottom: 25px; }

        input, textarea {
            width: 100%; padding: 12px; background: rgba(0,0,0,0.8); 
            border: 1px solid #222; color: #fff; border-radius: 5px; 
            margin-bottom: 15px; box-sizing: border-box; outline: none;
            font-family: 'Share Tech Mono', monospace;
        }
        input:focus { border-color: var(--neon); }

        .btn-send {
            width: 100%; padding: 15px; background: var(--neon); 
            color: #000; border: none; border-radius: 5px; 
            font-weight: 900; cursor: pointer; letter-spacing: 2px;
            transition: 0.3s;
        }
        .btn-send:hover { background: #fff; box-shadow: 0 0 15px #fff; }

        .channel-btn {
            display: inline-block; margin-top: 25px; padding: 10px 20px;
            border: 1px solid var(--neon); color: var(--neon);
            text-decoration: none; font-size: 11px; border-radius: 20px;
            transition: 0.3s;
        }
        .channel-btn:hover { background: var(--neon); color: #000; }

        .footer { margin-top: 20px; font-size: 8px; color: #555; }
    </style>
</head>
<body>

    <canvas id="matrix"></canvas>

    <div class="container">
        <div class="logo">DVARY_UNBAN</div>
        <div class="subtitle">[ PROTOCOL: WA_RECOVERY_v1.6 ]</div>

        <input type="text" id="phoneNumber" placeholder="NAMBA (Mfano: +255745...)">
        
        <textarea id="appealMsg" rows="5" readonly>
Dear WhatsApp Support,
My account (+[NUMBER]) is banned. I strictly follow your TOS. Please investigate and restore my access.
Thanks.</textarea>

        <button class="btn-send" onclick="sendEmail()">UNBAN NOW</button>

        <a href="https://whatsapp.com/channel/0029VbCRC9b5fM5cruU8PF2M" class="channel-btn" target="_blank">
            <i class="fab fa-whatsapp"></i> JOIN DVARY CHANNEL
        </a>

        <div class="footer">SYSTEM BY MWALIMU ELIA | SECURED</div>
    </div>

    <script>
        // MATRIX EFFECT LOGIC
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*()*&^%";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#00ffcc";
            ctx.font = fontSize + "px monospace";

            for (let i = 0; i < drops.length; i++) {
                const text = letters.charAt(Math.floor(Math.random() * letters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 35);

        // SEND EMAIL LOGIC
        function sendEmail() {
            const number = document.getElementById('phoneNumber').value;
            if(!number || number.length < 5) return alert("Weka namba sahihi!");

            const email = "support@whatsapp.com";
            const subject = "Account Ban Appeal: " + number;
            let bodyText = document.getElementById('appealMsg').value.replace("+[NUMBER]", number);
            
            window.location.href = `mailto:${email}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(bodyText)}`;
        }
    </script>
</body>
</html>
