<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dvary Super-Toolbox v1.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #00d2ff; --secondary: #3a7bd5; --dark: #0f0f0f; --card: #1a1a1a; --text: #e0e0e0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: var(--text); margin: 0; overflow-x: hidden; }

        /* SIDEBAR */
        .sidebar { position: fixed; left: -260px; top: 0; width: 250px; height: 100%; background: #000; transition: 0.4s; z-index: 1000; padding-top: 20px; border-right: 1px solid #333; }
        .sidebar.active { left: 0; }
        .sidebar a { padding: 15px 25px; text-decoration: none; font-size: 15px; color: #888; display: block; transition: 0.3s; border-bottom: 1px solid #111; }
        .sidebar a:hover { background: var(--secondary); color: white; padding-left: 35px; }
        
        .menu-btn { position: fixed; top: 20px; left: 20px; font-size: 22px; cursor: pointer; z-index: 1100; background: var(--secondary); color: white; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }

        /* MAIN AREA */
        .main-content { padding: 80px 20px; max-width: 800px; margin: auto; }
        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { color: var(--primary); margin: 0; font-size: 28px; }
        
        /* GRID YA TOOLS (Hizi ni zile 50+) */
        .tools-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; }
        .tool-card { background: var(--card); padding: 20px; border-radius: 18px; text-align: center; cursor: pointer; transition: 0.3s; border: 1px solid #333; }
        .tool-card:hover { transform: translateY(-5px); border-color: var(--primary); background: #222; }
        .tool-card i { font-size: 30px; color: var(--primary); margin-bottom: 10px; display: block; }
        .tool-card span { font-size: 13px; font-weight: bold; }

        /* WHATSAPP FLOATING BUTTONS (VIDUDE VITATU) */
        .wa-float { position: fixed; right: 20px; bottom: 20px; display: flex; flex-direction: column; gap: 12px; z-index: 1000; }
        .wa-btn { width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; text-decoration: none; font-size: 22px; box-shadow: 0 8px 20px rgba(0,0,0,0.5); transition: 0.3s; }
        .wa-btn:hover { transform: scale(1.1) rotate(10deg); }
        .bg-wa { background: #25D366; }
        .bg-info { background: #0088cc; }
        .bg-help { background: #ff9800; }

        /* MODAL YA KUFANYA KAZI */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; padding: 20px; box-sizing: border-box; }
        .modal-content { max-width: 500px; margin: 50px auto; background: var(--card); padding: 30px; border-radius: 25px; position: relative; border: 1px solid var(--primary); }
        .close-modal { position: absolute; top: 15px; right: 20px; font-size: 25px; cursor: pointer; color: #ff0050; }
        input { width: 100%; padding: 15px; margin: 15px 0; border-radius: 12px; border: 1px solid #444; background: #000; color: white; box-sizing: border-box; }
        .action-btn { width: 100%; padding: 15px; background: var(--primary); border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="menu-btn" onclick="toggleSidebar()"><i class="fas fa-th-large"></i></div>

    <div class="sidebar" id="mySidebar">
        <h2 style="text-align: center; color: var(--primary); font-size: 18px;">DVARY HUB</h2>
        <a href="#" onclick="toggleSidebar()"><i class="fas fa-home"></i> Dashboard</a>
        <a href="#"><i class="fas fa-shield-alt"></i> Cyber Tools</a>
        <a href="#"><i class="fas fa-download"></i> Downloader</a>
        <a href="#"><i class="fas fa-image"></i> Graphics</a>
        <a href="#"><i class="fas fa-terminal"></i> Termux Scripts</a>
    </div>

    <div class="main-content">
        <div class="header">
            <h1>DVARY SUPER-TOOLBOX</h1>
            <p style="color: #666; font-size: 14px;">Kila unachohitaji, sehemu moja.</p>
        </div>

        <div class="tools-grid">
            <div class="tool-card" onclick="openTool('TikTok Downloader')">
                <i class="fab fa-tiktok"></i>
                <span>TikTok DL</span>
            </div>
            <div class="tool-card" onclick="openTool('QR Code Generator')">
                <i class="fas fa-qrcode"></i>
                <span>QR Maker</span>
            </div>
            <div class="tool-card" onclick="openTool('Translator')">
                <i class="fas fa-language"></i>
                <span>Translator</span>
            </div>
            <div class="tool-card" onclick="openTool('Logo Maker')">
                <i class="fas fa-paint-brush"></i>
                <span>Logo Gen</span>
            </div>
            <div class="tool-card" onclick="openTool('RAM Booster')">
                <i class="fas fa-rocket"></i>
                <span>RAM Boost</span>
            </div>
             <div class="tool-card" onclick="openTool('IP Scanner')">
                <i class="fas fa-network-wired"></i>
                <span>IP Scanner</span>
            </div>
            <div class="tool-card" onclick="openTool('Password Gen')">
                <i class="fas fa-key"></i>
                <span>Pass Gen</span>
            </div>
        </div>
    </div>

    <div class="wa-float">
        <a href="https://wa.me/225752670587?text=Msaada" class="wa-btn bg-help"><i class="fas fa-question"></i></a>
        <a href="https://wa.me/225752670587?text=Habari+Mwalimu" class="wa-btn bg-info"><i class="fas fa-info"></i></a>
        <a href="https://wa.me/225752670587" class="wa-btn bg-wa"><i class="fab fa-whatsapp"></i></a>
    </div>

    <div id="toolModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <h2 id="toolTitle" style="color: var(--primary); text-align: center;"></h2>
            <p id="toolDesc" style="font-size: 13px; color: #888; text-align: center;"></p>
            
            <input type="text" id="toolInput" placeholder="Weka taarifa hapa...">
            <button class="action-btn" onclick="runCommand()">TEKELEZA (RUN)</button>
            
            <div id="toolOutput" style="margin-top: 20px; padding: 10px; background: #000; border-radius: 10px; color: #00ff00; font-family: monospace; display: none;"></div>
        </div>
    </div>

    <script>
        function toggleSidebar() {
            document.getElementById("mySidebar").classList.toggle("active");
        }

        function openTool(name) {
            document.getElementById('toolModal').style.display = 'block';
            document.getElementById('toolTitle').innerText = name;
            document.getElementById('toolDesc').innerText = "Unatumia chombo cha " + name + " kwa sasa.";
            document.getElementById('toolOutput').style.display = 'none';
        }

        function closeModal() {
            document.getElementById('toolModal').style.display = 'none';
        }

        function runCommand() {
            const output = document.getElementById('toolOutput');
            output.style.display = 'block';
            output.innerText = "Inatayarisha... Tafadhali subiri.";
            
            setTimeout(() => {
                output.innerText = "✅ Amri imetekelezwa kikamilifu kwenye server ya Dvary!";
            }, 2000);
        }
    </script>
</body>
</html>
