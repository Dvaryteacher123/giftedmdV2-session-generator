<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DVARY DOWNLOADER | ULTIMATE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #00ffcc; --bg: #050810; --card: #0a0f1a; }
        body { background: var(--bg); color: var(--p); font-family: 'Share Tech Mono', monospace; margin: 0; padding: 20px; text-align: center; text-transform: uppercase; }
        
        .top-nav { position: absolute; top: 20px; right: 20px; z-index: 100; }
        .menu-dots { color: var(--p); font-size: 24px; cursor: pointer; transition: 0.3s; padding: 10px; border-radius: 50%; }

        .container { max-width: 450px; margin: 60px auto; padding: 30px; border: 1px solid var(--p); background: var(--card); box-shadow: 0 0 20px rgba(0, 255, 204, 0.2); border-radius: 10px; position: relative; }
        .logo { font-size: 24px; font-weight: 900; letter-spacing: 5px; margin-bottom: 10px; color: #fff; text-shadow: 0 0 10px var(--p); }

        input { width: 100%; padding: 18px; background: #000; border: 1px solid var(--p); color: #fff; text-align: center; outline: none; margin-bottom: 20px; box-sizing: border-box; font-size: 14px; border-radius: 5px; }
        
        .btn-download { width: 100%; padding: 18px; background: var(--p); color: #000; border: none; font-weight: 900; cursor: pointer; letter-spacing: 2px; border-radius: 5px; }
        .btn-download:disabled { background: #111; color: #444; }

        #resultArea { margin-top: 30px; display: none; border: 1px dashed var(--p); padding: 20px; background: rgba(0,0,0,0.8); border-radius: 10px; }
        .dl-btn { display: block; background: #fff; color: #000; padding: 15px; text-decoration: none; font-weight: bold; border-radius: 5px; margin-top: 10px; font-size: 14px; }
        
        .loader { display: none; margin: 20px 0; font-size: 14px; color: #ff003c; font-weight: bold; }
    </style>
</head>
<body>

    <div class="top-nav">
        <a href="https://whatsapp.com/channel/0029VbCRC9b5fM5cruU8PF2M" target="_blank">
            <div class="menu-dots"><i class="fas fa-ellipsis-v"></i></div>
        </a>
    </div>

    <div class="container">
        <div class="logo">DVARY_DL_V6</div>
        <p style="font-size: 9px; color: #444; margin-bottom: 20px;">[ ENGINE: COBALT_BYPASS_v2 ]</p>
        
        <input type="text" id="urlInput" placeholder="PASTE LINK (FB, TIKTOK, INSTA)">
        
        <div class="loader" id="loading">BYPASSING FIREWALL...</div>

        <button class="btn-download" id="goBtn" onclick="processDownload()">DOWNLOAD NOW</button>

        <div id="resultArea">
            <p style="font-size: 12px; color: #fff;">SUCCESS! CLICK BELOW TO SAVE:</p>
            <div id="actions"></div>
        </div>
    </div>

    <script>
        async function processDownload() {
            const url = document.getElementById('urlInput').value;
            const loader = document.getElementById('loading');
            const btn = document.getElementById('goBtn');
            const resArea = document.getElementById('resultArea');
            const actions = document.getElementById('actions');

            if(!url) return alert("Weka link Mwalimu!");

            loader.style.display = 'block';
            btn.disabled = true;
            resArea.style.display = 'none';
            actions.innerHTML = '';

            try {
                // KITALAAMU: Tunatumia Cobalt API (Global Downloader)
                const response = await fetch("https://api.cobalt.tools/api/json", {
                    method: "POST",
                    headers: {
                        "Accept": "application/json",
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        url: url,
                        videoQuality: "720",
                        filenamePattern: "basic"
                    })
                });

                const data = await response.json();

                if (data.url) {
                    actions.innerHTML = `<a href="${data.url}" class="dl-btn" target="_blank">SAVE VIDEO TO GALLERY</a>`;
                    resArea.style.display = 'block';
                } else if (data.status === "picker") {
                    // Kwa picha nyingi (TikTok slideshow)
                    data.picker.forEach((item, index) => {
                        actions.innerHTML += `<a href="${item.url}" class="dl-btn" target="_blank">SAVE MEDIA ${index + 1}</a>`;
                    });
                    resArea.style.display = 'block';
                } else {
                    alert("Imeshindikana! Link hii ina ulinzi mkali sana.");
                }
            } catch (e) {
                alert("Hitilafu ya Mtandao! Hakikisha una MB za kutosha.");
            } finally {
                loader.style.display = 'none';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
