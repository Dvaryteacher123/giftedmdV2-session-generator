<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DVARY UNBAN | PRO APPEAL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --neon: #00ffcc; --bg: #000; }
        body { background-color: var(--bg); color: var(--neon); font-family: 'Share Tech Mono', monospace; margin: 0; overflow: hidden; height: 100vh; }
        #matrix { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.3; }
        .container { position: relative; z-index: 10; max-width: 420px; margin: 40px auto; background: rgba(13, 17, 23, 0.95); padding: 25px; border-radius: 15px; border: 1px solid var(--neon); box-shadow: 0 0 30px rgba(0, 255, 204, 0.4); text-align: center; }
        .logo { font-size: 24px; font-weight: bold; letter-spacing: 4px; margin-bottom: 5px; text-shadow: 0 0 10px var(--neon); }
        .subtitle { font-size: 10px; color: #888; margin-bottom: 20px; }
        input { width: 100%; padding: 15px; background: rgba(0,0,0,0.8); border: 1px solid #222; color: #fff; border-radius: 5px; margin-bottom: 15px; box-sizing: border-box; outline: none; font-family: inherit; }
        textarea { width: 100%; padding: 15px; background: rgba(0,0,0,0.8); border: 1px solid #222; color: #fff; border-radius: 5px; margin-bottom: 15px; box-sizing: border-box; outline: none; font-family: inherit; font-size: 12px; resize: none; border-left: 3px solid var(--neon); }
        .btn-send { width: 100%; padding: 18px; background: var(--neon); color: #000; border: none; border-radius: 5px; font-weight: 900; cursor: pointer; letter-spacing: 2px; }
        .channel-link { display: inline-block; margin-top: 20px; padding: 10px 15px; border: 1px solid var(--neon); color: var(--neon); text-decoration: none; font-size: 11px; border-radius: 20px; }
        .footer { margin-top: 15px; font-size: 8px; color: #444; }
    </style>
</head>
<body>

    <canvas id="matrix"></canvas>

    <div class="container">
        <div class="logo">DVARY_UNBAN</div>
        <div class="subtitle">[ ADVANCED RECOVERY PROTOCOL ]</div>

        <input type="text" id="phoneNumber" placeholder="WEKA NAMBA (Mfano: +255...)">
        
        <textarea id="appealMsg" rows="8" readonly>
Dear WhatsApp Support Team,

I am writing to formally appeal the ban on my WhatsApp account associated with the number [NUMBER]. 

I was surprised to find my account disabled, as I strive to follow all Terms of Service. This account is vital for my daily business operations and staying in touch with my family. I apologize if any unintentional activity caused a flag in your system.

Please re-examine my account status and restore it. I value your platform and will ensure full compliance moving forward.

Thank you for your assistance.</textarea>

        <button class="btn-send" onclick="sendEmail()">SEND APPEAL NOW</button>

        <a href="https://whatsapp.com/channel/0029VbCRC9b5fM5cruU8PF2M" class="channel-link" target="_blank">
            <i class="fab fa-whatsapp"></i> JOIN DVARY CHANNEL
        </a>

        <div class="footer">POWERED BY MWALIMU ELIA | DVARY MANYAMA</div>
    </div>

    <script>
        // Matrix Effect
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const letters = "0101DVARYMANYAMA0101";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function draw() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#00ffcc";
            ctx.font = fontSize + "px monospace";
            for (let i = 0; i < drops.length; i++) {
                const text = letters.charAt(Math.floor(Math.random() * letters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(draw, 35);

        // Email Logic
        function sendEmail() {
            const number = document.getElementById('phoneNumber').value;
            if(!number || number.length < 5) return alert("Mwalimu, weka namba kamili kwanza!");

            const email = "support@whatsapp.com";
            const subject = "Account Access Issue - " + number;
            let bodyText = document.getElementById('appealMsg').value.replace("[NUMBER]", number);
            
            // Inafungua Gmail moja kwa moja
            window.location.href = `mailto:${email}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(bodyText)}`;
        }
    </script>
</body>
</html>
