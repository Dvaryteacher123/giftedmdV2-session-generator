<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DVARY UNBAN MASTER | V19 PRO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #00ffcc; --bg: #000; }
        body { background: var(--bg); color: var(--p); font-family: 'Share Tech Mono', monospace; margin: 0; overflow: hidden; height: 100vh; transition: 0.5s; }
        #matrix { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.3; }
        
        /* TOP CONTROLS */
        .controls { position: relative; z-index: 100; background: rgba(0,0,0,0.8); padding: 10px; display: flex; justify-content: space-around; border-bottom: 1px solid var(--p); flex-wrap: wrap; gap: 10px; }
        select { background: #000; color: var(--p); border: 1px solid var(--p); padding: 5px; border-radius: 5px; outline: none; cursor: pointer; font-family: inherit; font-size: 11px; }

        .container { position: relative; z-index: 10; max-width: 450px; margin: 15px auto; background: rgba(13, 17, 23, 0.95); padding: 25px; border-radius: 15px; border: 1px solid var(--p); box-shadow: 0 0 30px rgba(0, 0, 0, 0.5); text-align: center; max-height: 85vh; overflow-y: auto; }
        .logo { font-size: 22px; font-weight: bold; letter-spacing: 4px; margin-bottom: 5px; text-shadow: 0 0 10px var(--p); }
        
        input, textarea { width: 100%; padding: 12px; background: rgba(0,0,0,0.8); border: 1px solid #222; color: #fff; border-radius: 5px; margin-bottom: 15px; box-sizing: border-box; outline: none; font-family: inherit; font-size: 11px; }
        textarea { border-left: 3px solid var(--p); height: 180px; text-align: left; }
        
        .btn-send { width: 100%; padding: 15px; background: var(--p); color: #000; border: none; border-radius: 5px; font-weight: 900; cursor: pointer; letter-spacing: 2px; }
        .channel-link { display: inline-block; margin-top: 15px; padding: 10px 15px; border: 1px solid var(--p); color: var(--p); text-decoration: none; font-size: 11px; border-radius: 20px; }
        .footer { margin-top: 15px; font-size: 8px; color: #444; }
    </style>
</head>
<body>

    <canvas id="matrix"></canvas>

    <div class="controls">
        <div>
            <i class="fas fa-globe"></i>
            <select id="langSwitch" onchange="changeContent()">
                <option value="en">English</option>
                <option value="sw">Kiswahili</option>
                <option value="fr">French</option>
                <option value="ar">Arabic</option>
            </select>
        </div>
        <div>
            <i class="fas fa-palette"></i>
            <select id="themeSwitch" onchange="changeTheme()">
                <option value="matrix">Matrix Green</option>
                <option value="hacker">Hacker Red</option>
                <option value="cyber">Cyber Blue</option>
                <option value="gold">Gold Edition</option>
            </select>
        </div>
    </div>

    <div class="container">
        <div class="logo">DVARY_UNBAN_v19</div>
        <div id="status_text" style="font-size: 9px; color: #888; margin-bottom: 15px;">[ SECURE RECOVERY SYSTEM ]</div>

        <input type="text" id="phoneNumber" placeholder="Phone Number (Ex: +255...)">
        
        <textarea id="appealMsg" readonly></textarea>

        <button class="btn-send" id="btn_text" onclick="sendEmail()">SEND OFFICIAL APPEAL</button>

        <a href="https://whatsapp.com/channel/0029VbCRC9b5fM5cruU8PF2M" class="channel-link" target="_blank">
            <i class="fab fa-whatsapp"></i> JOIN DVARY CHANNEL
        </a>

        <div class="footer">DEVELOPED BY MWALIMU ELIA | DVARY MANYAMA</div>
    </div>

    <script>
        const content = {
            en: {
                status: "[ OFFICIAL RECOVERY PROTOCOL ]",
                btn: "SEND OFFICIAL APPEAL",
                placeholder: "Phone Number (Ex: +255...)",
                msg: "Dear WhatsApp Support Team,\n\nI am writing to appeal the suspension of my account [NUMBER]. I was shocked to find my account banned as I always try to comply with your Terms of Service. This account is my primary tool for business and family communication. I may have unintentionally made a mistake, and I sincerely apologize for that. I assure you that I will strictly follow all rules and prevent any future issues. Please review my account and restore it as soon as possible.\n\nBest regards."
            },
            sw: {
                status: "[ MFUMO RASMI WA KUREJESHA NAMBA ]",
                btn: "TUMA MAOMBI RASMI",
                placeholder: "Namba ya Simu (Mfano: +255...)",
                msg: "Ndugu Timu ya Huduma ya WhatsApp,\n\nNinaandika barua hii kuomba kurejeshewa akaunti yangu [NUMBER]. Nimeshtushwa na kufungiwa kwa akaunti hii kwani nimekuwa nikijitahidi kufuata sheria zenu. Akaunti hii ni muhimu sana kwa shughuli zangu za kila siku na mawasiliano ya familia. Huenda kuna kosa lilitokea bila kukusudia, na ninaomba radhi kwa hilo. Ninaahidi kufuata kanuni zenu zote kuanzia sasa. Tafadhali fanyeni mapitio na kunifungulia akaunti yangu.\n\nWako mtiifu."
            },
            fr: {
                status: "[ PROTOCOLE DE RÉCUPÉRATION ]",
                btn: "ENVOYER L'APPEL",
                placeholder: "Numéro de téléphone",
                msg: "Cher support WhatsApp,\n\nJe vous contacte pour contester la suspension de mon compte [NUMBER]. Je respecte scrupuleusement vos conditions d'utilisation. Ce compte est indispensable pour mon travail et mes contacts familiaux. Je m'excuse pour toute erreur involontaire. Je m'engage à respecter toutes vos règles à l'avenir. Merci de bien vouloir restaurer mon compte dès que possible.\n\nCordialement."
            },
            ar: {
                status: "[ بروتوكول الاسترداد الرسمي ]",
                btn: "إرسال طلب رسمي",
                placeholder: "رقم الهاتف",
                msg: "عزيزي فريق دعم واتساب،\n\nأكتب إليكم لاستئناف تعليق حسابي [NUMBER]. لقد صدمت عندما وجدت حسابي محظورًا لأنني أحاول دائمًا الالتزام بشروط الخدمة الخاصة بكم. هذا الحساب هو أداتي الأساسية للعمل والتواصل العائلي. يرجى مراجعة حسابي واستعادته في أقرب وقت ممكن.\n\nمع خالص التقدير."
            }
        };

        const themes = {
            matrix: { color: "#00ffcc", bg: "#000" },
            hacker: { color: "#ff003c", bg: "#000" },
            cyber: { color: "#00ccff", bg: "#050810" },
            gold: { color: "#ffcc00", bg: "#111" }
        };

        function changeContent() {
            const lang = document.getElementById('langSwitch').value;
            const data = content[lang];
            document.getElementById('status_text').innerText = data.status;
            document.getElementById('btn_text').innerText = data.btn;
            document.getElementById('phoneNumber').placeholder = data.placeholder;
            document.getElementById('appealMsg').value = data.msg;
        }

        function changeTheme() {
            const theme = document.getElementById('themeSwitch').value;
            const style = themes[theme];
            document.documentElement.style.setProperty('--p', style.color);
            document.documentElement.style.setProperty('--bg', style.bg);
        }

        function sendEmail() {
            const number = document.getElementById('phoneNumber').value;
            const lang = document.getElementById('langSwitch').value;
            if(!number || number.length < 5) return alert("Enter number!");
            const email = "support@whatsapp.com";
            const subject = "Question about my account - " + number;
            let bodyText = content[lang].msg.replace("[NUMBER]", number);
            window.location.href = `mailto:${email}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(bodyText)}`;
        }

        changeContent();
        // Matrix Animation Logic
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const letters = "DVARY01"; const fontSize = 16; const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);
        function draw() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--p');
            ctx.font = fontSize + "px monospace";
            for (let i = 0; i < drops.length; i++) {
                const text = letters.charAt(Math.floor(Math.random() * letters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(draw, 35);
    </script>
</body>
</html>
