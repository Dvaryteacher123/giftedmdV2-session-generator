<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DVARY DOWNLOADER | FIREWALL_CRUSHER</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #00ffcc; --bg: #050810; --card: #0a0f1a; }
        body { background: var(--bg); color: var(--p); font-family: 'Share Tech Mono', monospace; margin: 0; padding: 20px; text-align: center; text-transform: uppercase; }
        
        .container { max-width: 450px; margin: 60px auto; padding: 30px; border: 1px solid var(--p); background: var(--card); box-shadow: 0 0 20px rgba(0, 255, 204, 0.2); border-radius: 10px; position: relative; }
        .logo { font-size: 24px; font-weight: 900; letter-spacing: 5px; margin-bottom: 10px; color: #fff; text-shadow: 0 0 10px var(--p); }

        input { width: 100%; padding: 18px; background: #000; border: 1px solid var(--p); color: #fff; text-align: center; outline: none; margin-bottom: 20px; box-sizing: border-box; font-size: 14px; border-radius: 5px; }
        
        .btn-download { width: 100%; padding: 18px; background: var(--p); color: #000; border: none; font-weight: 900; cursor: pointer; letter-spacing: 2px; border-radius: 5px; }
        
        #resultArea { margin-top: 30px; display: none; border: 1px dashed var(--p); padding: 20px; border-radius: 10px; }
        .dl-btn { display: block; background: #fff; color: #000; padding: 15px; text-decoration: none; font-weight: bold; border-radius: 5px; margin-top: 10px; font-size: 14px; }
        
        .loader { display: none; margin: 20px 0; font-size: 14px; color: #ff003c; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">DVARY_V9_PRO</div>
        <p style="font-size: 9px; color: #444; margin-bottom: 20px;">[ STATUS: FIREWALL_BYPASS_ACTIVE ]</p>
        
        <input type="text" id="urlInput" placeholder="PASTE FB / TIKTOK LINK HERE...">
        
        <div class="loader" id="loading">CRUSHING FIREWALL...</div>

        <button class="btn-download" id="goBtn" onclick="crushFirewall()">FETCH VIDEO</button>

        <div id="resultArea">
            <p style="font-size: 12px; color: #fff;">SECURITY BYPASSED! SAVE NOW:</p>
            <div id="actions"></div>
        </div>
    </div>

    <script>
        async function crushFirewall() {
            const url = document.getElementById('urlInput').value;
            const loader = document.getElementById('loading');
            const resArea = document.getElementById('resultArea');
            const actions = document.getElementById('actions');

            if(!url) return alert("Weka link Mwalimu!");

            loader.style.display = 'block';
            resArea.style.display = 'none';

            try {
                // NJIA MPYA: Tunatumia API ya "All-In-One" ambayo inapita kwenye Cloudflare ya FB
                const response = await fetch(`https://api.tikwm.com/api/?url=${encodeURIComponent(url)}`);
                const data = await response.json();

                if (data.code === 0 && data.data) {
                    const videoUrl = data.data.play || data.data.hdplay;
                    actions.innerHTML = `<a href="${videoUrl}" class="dl-btn" target="_blank">DOWNLOAD VIDEO NOW</a>`;
                    resArea.style.display = 'block';
                } else {
                    // KAMA FIREWALL BADO NI KALI - TUNATUMIA MPANGO B (The Smart Redirect)
                    loader.innerText = "BYPASSING VIA SECONDARY TUNNEL...";
                    setTimeout(() => {
                        window.open(`https://www.fdown.net/download.php?url=${encodeURIComponent(url)}`, '_blank');
                        loader.innerText = "TUNNEL OPENED!";
                    }, 2000);
                }
            } catch (e) {
                alert("Server Timeout! Facebook Firewall ni kali kwa sasa.");
            } finally {
                setTimeout(() => { loader.style.display = 'none'; }, 3000);
            }
        }
    </script>
</body>
</html>
