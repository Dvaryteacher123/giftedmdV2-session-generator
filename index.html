<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DVARY TOOLBOX | KILA KITU RAHISI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #00ffcc; --bg: #050810; --card: #0a0f1a; }
        body { background: var(--bg); color: var(--p); font-family: 'Share Tech Mono', monospace; margin: 0; padding: 15px; text-align: center; }
        
        .container { max-width: 450px; margin: auto; }
        .logo { font-size: 24px; font-weight: 900; letter-spacing: 5px; margin-bottom: 30px; color: #fff; text-shadow: 0 0 10px var(--p); }

        .tool-card { background: var(--card); border: 1px solid #222; border-radius: 15px; padding: 20px; margin-bottom: 20px; text-align: left; transition: 0.3s; }
        .tool-card:hover { border-color: var(--p); box-shadow: 0 0 15px rgba(0,255,204,0.1); }
        
        h3 { font-size: 14px; margin-top: 0; color: #fff; border-bottom: 1px solid #222; padding-bottom: 10px; }
        input { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: var(--p); border-radius: 5px; box-sizing: border-box; margin-top: 10px; outline: none; }
        
        .btn { width: 100%; padding: 12px; background: var(--p); color: #000; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 15px; text-decoration: none; display: block; text-align: center; }

        .top-nav { display: flex; justify-content: space-between; padding: 10px; }
    </style>
</head>
<body>

    <div class="top-nav">
        <div style="font-size: 10px; color: #444;">DVARY_OS_v10</div>
        <a href="https://whatsapp.com/channel/0029VbCRC9b5fM5cruU8PF2M" style="color: var(--p);"><i class="fas fa-ellipsis-v"></i></a>
    </div>

    <div class="container">
        <div class="logo">DVARY_TOOLBOX</div>

        <div class="tool-card">
            <h3><i class="fab fa-whatsapp"></i> CHATI BILA KUSAVE NAMBA</h3>
            <p style="font-size: 11px; color: #666;">Ingiza namba (Anza na 255) uanze kuchati fasta.</p>
            <input type="number" id="waNumber" placeholder="Mfano: 255745XXXXXX">
            <button class="btn" onclick="openWa()">ANZA KUCHATI</button>
        </div>

        <div class="tool-card">
            <h3><i class="fas fa-link"></i> FUPISHA LINK (SHORTENER)</h3>
            <p style="font-size: 11px; color: #666;">Weka link ndefu hapa ili uipunguze.</p>
            <input type="text" id="longUrl" placeholder="Paste link yako hapa...">
            <button class="btn" onclick="shortenUrl()">FUPISHA LINK SASA</button>
        </div>

        <div class="tool-card">
            <h3><i class="fas fa-tools"></i> VIFAA VINGINE (FREE)</h3>
            <a href="https://www.remove.bg" target="_blank" class="btn" style="background: #222; color: #fff; margin-bottom: 10px;">ONDOA BACKGROUND YA PICHA</a>
            <a href="https://www.ilovepdf.com" target="_blank" class="btn" style="background: #222; color: #fff;">BADILI PICHA KUWA PDF</a>
        </div>

    </div>

    <p style="font-size: 8px; color: #333; margin-top: 20px;">SYSTEM DESIGNED BY DVARY MANYAMA | MWALIMU ELIA</p>

    <script>
        function openWa() {
            const num = document.getElementById('waNumber').value;
            if(!num) return alert("Weka namba!");
            window.open(`https://wa.me/${num}`, '_blank');
        }

        function shortenUrl() {
            const url = document.getElementById('longUrl').value;
            if(!url) return alert("Weka link!");
            // Tunatumia TinyURL kwa haraka
            window.open(`https://tinyurl.com/api-create.php?url=${encodeURIComponent(url)}`, '_blank');
            alert("Nimekuandalia link fupi, itafunguka kwenye tab mpya!");
        }
    </script>
</body>
</html>
