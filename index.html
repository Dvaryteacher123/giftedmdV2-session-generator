<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DVARY DOWNLOADER | PRO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #00ffcc; --bg: #050810; --card: #0a0f1a; }
        body { background: var(--bg); color: var(--p); font-family: 'Share Tech Mono', monospace; margin: 0; padding: 20px; text-align: center; text-transform: uppercase; }
        
        /* WHATSAPP MENU BUTTON (VIDUDE VITATU) */
        .top-nav { position: absolute; top: 20px; right: 20px; z-index: 100; }
        .menu-dots { color: var(--p); font-size: 24px; cursor: pointer; transition: 0.3s; padding: 10px; border: 1px solid transparent; border-radius: 50%; }
        .menu-dots:hover { border-color: var(--p); box-shadow: 0 0 15px var(--p); }

        .container { max-width: 450px; margin: 60px auto; padding: 30px; border: 1px solid var(--p); background: var(--card); box-shadow: 0 0 20px rgba(0, 255, 204, 0.2); border-radius: 10px; position: relative; }
        .logo { font-size: 24px; font-weight: 900; letter-spacing: 5px; margin-bottom: 10px; color: #fff; }

        .platforms { font-size: 30px; margin-bottom: 25px; display: flex; justify-content: center; gap: 25px; color: #222; }
        .active-fb { color: #1877F2; text-shadow: 0 0 15px #1877F2; }
        .active-tt { color: #ff0050; text-shadow: 0 0 15px #ff0050; }

        input { width: 100%; padding: 18px; background: #000; border: 1px solid var(--p); color: #fff; text-align: center; outline: none; margin-bottom: 20px; box-sizing: border-box; font-size: 14px; border-radius: 5px; }
        
        .btn-download { width: 100%; padding: 18px; background: var(--p); color: #000; border: none; font-weight: 900; cursor: pointer; letter-spacing: 2px; border-radius: 5px; transition: 0.3s; }
        .btn-download:hover { background: #fff; transform: scale(1.02); }
        .btn-download:disabled { background: #111; color: #444; }

        #resultArea { margin-top: 30px; display: none; border: 1px dashed var(--p); padding: 20px; background: rgba(0,0,0,0.8); border-radius: 10px; }
        .dl-btn { display: block; background: #fff; color: #000; padding: 15px; text-decoration: none; font-weight: bold; border-radius: 5px; margin-top: 10px; font-size: 14px; }
        
        .loader { display: none; margin: 20px 0; font-size: 14px; letter-spacing: 3px; color: #ff003c; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.2; } }

        /* TOOLTIP KWA MBALI */
        .hint { font-size: 8px; color: #444; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="top-nav">
        <a href="https://whatsapp.com/channel/0029VbCRC9b5fM5cruU8PF2M" target="_blank" style="text-decoration: none;">
            <div class="menu-dots" title="Join WhatsApp Channel">
                <i class="fas fa-ellipsis-v"></i>
            </div>
        </a>
        <div class="hint">CHANNEL</div>
    </div>

    <div class="container">
        <div class="logo">DVARY_DL_v4</div>
        <p style="font-size: 9px; color: #444; margin-bottom: 20px;">[ MULTI-PLATFORM SCRAPER ]</p>
        
        <div class="platforms">
            <i class="fab fa-tiktok" id="tt"></i>
            <i class="fab fa-facebook" id="fb"></i>
        </div>

        <input type="text" id="urlInput" placeholder="PASTE TIKTOK / FB LINK..." oninput="highlightIcon()">
        
        <div class="loader" id="loading">SCRAPING_DATA...</div>

        <button class="btn-download" id="goBtn" onclick="processDownload()">GET VIDEO</button>

        <div id="resultArea">
            <div id="videoInfo" style="margin-bottom: 15px; font-size: 12px; color: #fff;"></div>
            <div id="actions"></div>
        </div>
    </div>

    <p style="font-size: 8px; color: #333; margin-top: 20px;">DEPLOYED BY DVARY MANYAMA | TECHNOLOGY EDUCATOR</p>

    <script>
        function highlightIcon() {
            const val = document.getElementById('urlInput').value.toLowerCase();
            document.getElementById('tt').className = val.includes('tiktok') ? 'fab fa-tiktok active-tt' : 'fab fa-tiktok';
            document.getElementById('fb').className = (val.includes('facebook') || val.includes('fb.watch')) ? 'fab fa-facebook active-fb' : 'fab fa-facebook';
        }

        async function processDownload() {
            const url = document.getElementById('urlInput').value;
            if(!url) return alert("Weka link kwanza!");

            const loader = document.getElementById('loading');
            const btn = document.getElementById('goBtn');
            const resArea = document.getElementById('resultArea');
            const actions = document.getElementById('actions');

            loader.style.display = 'block';
            btn.disabled = true;
            resArea.style.display = 'none';
            actions.innerHTML = '';

            try {
                // Tunatumia API ya kitalaamu ya TikWM kwa sasa
                const apiResponse = await fetch(`https://api.tikwm.com/api/?url=${encodeURIComponent(url)}`);
                const data = await apiResponse.json();

                if(data.code === 0 || (data.data && data.data.play)) {
                    document.getElementById('videoInfo').innerText = data.data.title || "VIDEO DETECTED!";
                    
                    if(url.includes('tiktok')) {
                        actions.innerHTML += `<a href="https://api.tikwm.com${data.data.play}" class="dl-btn" target="_blank">DOWNLOAD NO-WM</a>`;
                    } else {
                        actions.innerHTML += `<a href="${data.data.play}" class="dl-btn" target="_blank">DOWNLOAD FB VIDEO</a>`;
                    }
                    resArea.style.display = 'block';
                } else {
                    alert("Imeshindikana! Hakikisha link ni sahihi.");
                }
            } catch (e) {
                alert("Hitilafu ya Server!");
            } finally {
                loader.style.display = 'none';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
